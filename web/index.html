<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark">G</div>
      <div class="logo-text">Galt<span class="dim"> / the gulch</span></div>
    </div>

    <div class="status-row">
      <div class="pill" id="pill-chatdb"><span class="dot"></span><span class="pill-label">chat.db</span></div>
      <div class="pill" id="pill-watcher"><span class="dot"></span><span class="pill-label">watcher</span></div>
      <div class="pill" id="pill-model"><span class="dot"></span><span class="pill-label">gpt-4o-mini</span></div>
      <div class="pill" id="pill-drafts"><span class="dot"></span><span class="pill-label">— drafts pending</span></div>
      <div class="pill" id="pill-away" style="display:none;"><span class="dot amber"></span><span class="pill-label">away mode on</span></div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="nav-section">
      <div class="nav-item active" data-view="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h3v-6h6v6h3a1 1 0 0 0 1-1V10"/></svg>
        Home
      </div>
      <div class="nav-item" data-view="inbox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
        Inbox
        <span class="nav-count" id="nav-inbox-count">—</span>
        <span class="nav-badge" id="nav-drafts-badge" style="display:none;">0</span>
      </div>
      <div class="nav-item" data-view="radar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/><line x1="12" y1="12" x2="20.5" y2="3.5"/></svg>
        Radar
        <span class="nav-count" id="nav-radar-count">—</span>
      </div>
      <div class="nav-item" data-view="auto-notes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
        Auto Notes
        <span class="nav-badge" id="nav-auto-notes-badge" style="display:none;">0</span>
      </div>
      <div class="nav-item" data-view="away">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        Away mode
        <span class="nav-badge" id="nav-away-badge" style="display:none;">on</span>
      </div>
      <div class="nav-item" data-view="summon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l1.6 4.9L18 8l-4.4 1.1L12 14l-1.6-4.9L6 8l4.4-1.1L12 2z"/><circle cx="18" cy="18" r="2"/><path d="M16 16v0M20 16v0M16 20v0M20 20v0"/></svg>
        Summon
        <span class="nav-badge" id="nav-summon-badge" style="display:none;">0</span>
      </div>
      <div class="nav-item" data-view="prompts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="13" y2="14"/></svg>
        Prompts
      </div>
      <div class="nav-item" data-view="queue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Queue
        <span class="nav-badge" id="nav-queue-badge" style="display:none;">0</span>
      </div>
      <div class="nav-item" data-view="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </div>
    </div>

    <!-- Monitor-rules editor lived here; removed during sidebar cleanup.
         Rules persist in app.db and continue to drive Flags + Auto-calendar
         extraction. The editor UI will return on a future surface
         (likely Settings); rules can be managed via the API in the meantime. -->
  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-header">
      <div>
        <div class="main-title">Drafts queue</div>
        <div class="main-sub"><span class="accent" id="main-pending-count">— pending</span> · awaiting your approval before send</div>
      </div>
    </div>

    <div id="drafts-list">
      <div class="empty">
        <div class="empty-title">loading…</div>
      </div>
    </div>

    <!-- Sticky compose bar. Filled by the thread view; empty otherwise. -->
    <div id="thread-compose-bar"></div>
  </div>

  <!-- Right panel: only visible in thread view (toolbar + profile + notes). -->
  <div class="rightpanel">
    <div id="thread-toolbar"></div>
    <div id="thread-profile"></div>
    <div id="thread-notes"></div>
  </div>

</div>

<script type="module" src="/js/main.js"></script>

</body>
</html>
